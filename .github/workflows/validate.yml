name: Code Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # CI-BYPASS-001: 全履歴がないと merge-base が解決できず
        # --git-diff が 0 ファイルでゲートを素通りする
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pip-audit || echo "pip-audit not available"

    - name: Run Code Validator
      run: |
        python validator.py --git-diff --output validation-report.json --format json

    - name: Upload validation report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: validation-report
        path: validation-report.json

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const fs = require('fs');
          const reportPath = 'validation-report.json';

          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const summary = report.summary;

            const comment = `## Code Validation Results

            - Critical: ${summary.critical}
            - High: ${summary.high}
            - Medium: ${summary.medium}
            - Low: ${summary.low}
            - Info: ${summary.info}

            ${summary.critical > 0 || summary.high > 0 ? '**Issues detected. Please review and fix.**' : 'No critical issues found.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
